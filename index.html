<!DOCTYPE html>
<html>
<head>
  <title>hook 💖</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ff8fb1);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .phone {
      width: 340px;
      height: 650px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ff4d88;
      font-size: 16px;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 20px;
      margin: 6px 0;
      font-size: 14px;
    }

    .incoming {
      background: #f1f1f4;
      align-self: flex-start;
    }

    .outgoing {
      background: linear-gradient(135deg, #ff4d88, #ff85a2);
      color: white;
      align-self: flex-end;
    }

    .option {
      background: white;
      border: 1px solid #ffd1e1;
      padding: 12px;
      border-radius: 15px;
      margin: 6px 0;
      cursor: pointer;
    }

    .option:hover {
      background: #ffe4ee;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      margin-top: 8px;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(135deg, #ff4d88, #ff85a2);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .slider {
      margin-top: 12px;
      color: #ff4d88;
    }

    .typing {
      font-style: italic;
      color: #888;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="phone">
  <div class="header">hook — flirt smarter 💋</div>
  <div class="chat" id="chat"></div>

  <input id="inputMessage" placeholder="what did they say…">

  <div class="slider">
    <input type="range" min="0" max="100" value="50" id="toneSlider" oninput="updateTone()">
    <div id="toneLabel">playful 😏</div>
  </div>

  <button onclick="generate()">generate options</button>
</div>

<script>
let flirtLevel = 50;

function updateTone() {
  flirtLevel = document.getElementById("toneSlider").value;

  let label = "sweet 💌";
  if (flirtLevel > 33) label = "playful 😏";
  if (flirtLevel > 66) label = "dangerous 🔥";

  document.getElementById("toneLabel").innerText = label;
}

function addBubble(text, type) {
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "bubble " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addOption(text) {
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "option";
  div.innerText = text;

  div.onclick = () => {
    addBubble(text, "outgoing");
    document.querySelectorAll(".option").forEach(o => o.remove());
  };

  chat.appendChild(div);
}

// 🧠 smarter intent detection
function analyzeMessage(msg) {
  msg = msg.toLowerCase();

  if (msg.includes("drink") || msg.includes("come") || msg.includes("hang")) return "invite";
  if (msg.includes("?")) return "question";
  if (msg.includes("miss")) return "emotional";
  if (msg.length < 10) return "low_effort";

  return "general";
}

// 🎯 contextual replies
function generateReplies(type) {
  let replies = [];

  if (type === "invite") {
    if (flirtLevel < 33) {
      replies = [
        "that actually sounds kinda nice",
        "hmm i might be convinced",
        "depends… where are we going?"
      ];
    } else if (flirtLevel < 66) {
      replies = [
        "is that your best invite?",
        "you’re gonna have to try a little harder than that",
        "tempting… keep talking"
      ];
    } else {
      replies = [
        "pick me up at 8",
        "careful, i might say yes",
        "you don’t even have to ask twice"
      ];
    }
  }

  else if (type === "low_effort") {
    replies = [
      "you can do better than that",
      "that’s all you’ve got?",
      "hmm try again"
    ];
  }

  else if (type === "question") {
    replies = [
      "why do you wanna know?",
      "depends who’s asking",
      "what would you do with that information?"
    ];
  }

  else if (type === "emotional") {
    replies = [
      "that’s actually really sweet",
      "you don’t usually say stuff like that",
      "i kinda like hearing that"
    ];
  }

  else {
    replies = [
      "hmm interesting",
      "go on",
      "i’m listening"
    ];
  }

  // shuffle + pick 3 (no repeats)
  return replies.sort(() => 0.5 - Math.random()).slice(0, 3);
}

function generate() {
  let input = document.getElementById("inputMessage").value;
  if (!input) return;

  document.querySelectorAll(".option").forEach(o => o.remove());

  addBubble(input, "incoming");
  document.getElementById("inputMessage").value = "";

  let chat = document.getElementById("chat");
  let typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "thinking...";
  chat.appendChild(typing);

  setTimeout(() => {
    chat.removeChild(typing);

    let type = analyzeMessage(input);
    let replies = generateReplies(type);

    replies.forEach((r, i) => {
      setTimeout(() => addOption(r), i * 250);
    });

  }, 600);
}
</script>

</body>
</html>
