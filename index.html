<!DOCTYPE html>
<html>
<head>
  <title>hook 💖</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ff8fb1);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .phone {
      width: 340px;
      height: 650px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ff4d88;
      font-size: 16px;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 20px;
      margin: 6px 0;
      font-size: 14px;
      line-height: 1.4;
    }

    .incoming {
      background: #f1f1f4;
      color: #333;
      align-self: flex-start;
    }

    .outgoing {
      background: linear-gradient(135deg, #ff4d88, #ff85a2);
      color: white;
      align-self: flex-end;
    }

    .option {
      background: rgba(255,255,255,0.9);
      border: 1px solid #ffd1e1;
      padding: 10px;
      border-radius: 15px;
      margin: 5px 0;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }

    .option:hover {
      background: #ffe4ee;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      outline: none;
      font-size: 14px;
      margin-top: 8px;
    }

    button {
      margin-top: 8px;
      padding: 12px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(135deg, #ff4d88, #ff85a2);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .slider {
      margin-top: 10px;
      font-size: 12px;
      color: #ff4d88;
    }

    .typing {
      font-style: italic;
      color: #888;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="phone">
  <div class="header">hook — flirt smarter 💋</div>

  <div class="chat" id="chat"></div>

  <input id="inputMessage" placeholder="what did they say…">

  <div class="slider">
    <input type="range" min="0" max="100" value="50" id="toneSlider" oninput="updateTone()">
    <div id="toneLabel">playful 😏</div>
  </div>

  <button onclick="generate()">generate options</button>
</div>

<script>
let flirtLevel = 50;

function updateTone() {
  flirtLevel = document.getElementById("toneSlider").value;

  let label = "sweet 💌";
  if (flirtLevel > 33) label = "playful 😏";
  if (flirtLevel > 66) label = "dangerous 🔥";

  document.getElementById("toneLabel").innerText = label;
}

function addBubble(text, type) {
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "bubble " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addOption(text) {
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "option";
  div.innerText = text;

  div.onclick = () => {
    addBubble(text, "outgoing");
    document.querySelectorAll(".option").forEach(o => o.remove());
  };

  chat.appendChild(div);
}

function analyzeMessage(message) {
  message = message.toLowerCase();

  if (message.includes("wyd") || message.includes("what are you doing")) return "plan";
  if (message.includes("come over") || message.includes("grab drinks")) return "invite";
  if (message.includes("miss you")) return "emotional";
  if (message.includes("u up")) return "late";
  if (message.includes("pic")) return "pic";
  return "general";
}

function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateReplies(type) {
  let soft = [];
  let playful = [];
  let bold = [];

  if (type === "plan") {
    soft = ["just taking it easy tonight", "nothing exciting yet", "keeping it lowkey"];
    playful = ["depends… are you making it interesting?", "nothing yet but that could change", "why, what are you plotting?"];
    bold = ["waiting for you to fix that", "bored… entertain me", "about to get into trouble probably"];
  }

  else if (type === "invite") {
    soft = ["hmm maybe", "tempting", "i’ll think about it"];
    playful = ["bold of you to assume i’d say yes", "convince me", "tempting… keep talking"];
    bold = ["send the address", "you already know the answer", "careful, i might actually show up"];
  }

  else if (type === "emotional") {
    soft = ["that’s really sweet", "i like hearing that", "you caught me off guard"];
    playful = ["aww… look at you", "you don’t usually say that", "that’s kinda cute"];
    bold = ["you miss me or you’re bored?", "dangerous thing to say", "you don’t get to say that so casually"];
  }

  else {
    soft = ["hey :)", "hi you", "what’s up"];
    playful = ["just ‘hey’?", "that’s all you’ve got?", "try again"];
    bold = ["you definitely want something", "i can tell already", "don’t start something you can’t finish"];
  }

  return [
    getRandom(soft),
    getRandom(playful),
    getRandom(bold)
  ];
}

function generate() {
  let input = document.getElementById("inputMessage").value;
  if (!input) return;

  // clear old options
  document.querySelectorAll(".option").forEach(o => o.remove());

  addBubble(input, "incoming");

  // clear input
  document.getElementById("inputMessage").value = "";

  let chat = document.getElementById("chat");
  let typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "thinking...";
  chat.appendChild(typing);

  setTimeout(() => {
    chat.removeChild(typing);

    let type = analyzeMessage(input);
    let replies = generateReplies(type);

    replies.forEach((r, i) => {
      setTimeout(() => addOption(r), i * 250);
    });

  }, 700);
}
</script>

</body>
</html>
