<!DOCTYPE html>
<html>
<head>
  <title>hook 💖</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #ffc0cb, #ff69b4);
      color: white;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 3em;
    }

    input {
      padding: 10px;
      width: 300px;
      border-radius: 10px;
      border: none;
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background-color: white;
      color: #ff69b4;
      font-weight: bold;
      cursor: pointer;
    }

    .reply {
      background: rgba(255,255,255,0.2);
      margin: 10px auto;
      padding: 10px;
      border-radius: 15px;
      width: 300px;
    }
  </style>
</head>

<body>

  <h1>hook 💖</h1>
  <p>flirt smarter, not harder</p>

  <input id="inputMessage" placeholder="paste his text here...">
  <br>

  <button onclick="generate()">generate replies</button>

  <div id="output"></div>

  <script>
    function generate() {
      let replies = [
        "hmm depends… are you trying to make plans with me? 👀",
        "nothing exciting yet but you could change that",
        "currently deciding if i’m going out… convince me?"
      ];

      let output = document.getElementById("output");
      output.innerHTML = "";

      replies.forEach(r => {
        let div = document.createElement("div");
        div.className = "reply";
        div.innerText = r;
        output.appendChild(div);
      });
    }
  </script>

</body>
</html>
