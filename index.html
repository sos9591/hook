<!DOCTYPE html>
<html>
<head>
  <title>hook 💖</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(to bottom right, #ffc0cb, #ff69b4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .phone {
      width: 320px;
      height: 600px;
      background: #fff;
      border-radius: 40px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
      color: #ff69b4;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .bubble {
      max-width: 70%;
      padding: 10px;
      border-radius: 18px;
      margin: 5px 0;
    }

    .incoming {
      background: #e5e5ea;
      align-self: flex-start;
    }

    .outgoing {
      background: #ff69b4;
      color: white;
      align-self: flex-end;
    }

    .controls {
      margin-top: 10px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ddd;
    }

    button {
      margin-top: 10px;
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      background: #ff69b4;
      color: white;
      cursor: pointer;
    }

    .slider {
      margin-top: 10px;
    }

    .typing {
      font-style: italic;
      color: gray;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="phone">
  <div class="header">hook 💖</div>

  <div class="chat" id="chat"></div>

  <div class="controls">
    <input id="inputMessage" placeholder="iMessage...">
    
    <div class="slider">
      <input type="range" min="0" max="2" value="1" id="toneSlider" oninput="updateTone()">
      <div id="toneLabel">playful</div>
    </div>

    <button onclick="generate()">send</button>
  </div>
</div>

<script>
let tone = 1;
let usedReplies = [];

function updateTone() {
  tone = document.getElementById("toneSlider").value;
  let labels = ["neutral", "playful", "unhinged"];
  document.getElementById("toneLabel").innerText = labels[tone];
}

function analyzeMessage(message) {
  message = message.toLowerCase();

  if (message.includes("wyd") || message.includes("what are you doing") || message.includes("what are you up to")) return "plan";
  if (message.includes("come over")) return "invite";
  if (message.includes("miss you")) return "emotional";
  if (message.includes("u up")) return "late";
  if (message.includes("hey") || message.includes("hi")) return "opening";

  return "general";
}

function addBubble(text, type) {
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "bubble " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function getUniqueReplies(pool) {
  let shuffled = pool.sort(() => 0.5 - Math.random());
  let unique = shuffled.filter(r => !usedReplies.includes(r));
  let selected = unique.slice(0, 3);
  usedReplies.push(...selected);
  return selected;
}

function generate() {
  let input = document.getElementById("inputMessage").value;
  if (!input) return;

  addBubble(input, "incoming");

  let chat = document.getElementById("chat");
  let typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "typing...";
  chat.appendChild(typing);

  setTimeout(() => {
    chat.removeChild(typing);

    let type = analyzeMessage(input);
    let pool = [];

    // NEUTRAL
    if (tone == 0) {
      if (type == "invite") {
        pool = [
          "hmm maybe, what’s the plan?",
          "tempting… what did you have in mind?",
          "i could be convinced"
        ];
      } else if (type == "emotional") {
        pool = [
          "that’s sweet… i miss you too",
          "you always say things like that",
          "i didn’t expect that but i like it"
        ];
      } else {
        pool = [
          "just taking it easy tonight",
          "nothing planned yet",
          "keeping it lowkey"
        ];
      }
    }

    // PLAYFUL
    if (tone == 1) {
      if (type == "invite") {
        pool = [
          "that depends… is it worth it?",
          "bold of you to assume i’d say yes",
          "hmm… convince me"
        ];
      } else if (type == "late") {
        pool = [
          "dangerous question at this hour",
          "i am now… why?",
          "depends who’s asking"
        ];
      } else if (type == "emotional") {
        pool = [
          "oh? you miss me now?",
          "that’s a little suspicious timing",
          "careful… i might believe you"
        ];
      } else {
        pool = [
          "depends… are you about to make it interesting?",
          "nothing yet but i feel like that might change",
          "waiting for a better offer 👀"
        ];
      }
    }

    // UNHINGED
    if (tone == 2) {
      if (type == "invite") {
        pool = [
          "you didn’t think i’d say no, did you?",
          "say less. send the address",
          "careful… i might actually show up"
        ];
      } else if (type == "late") {
        pool = [
          "you text everyone this late or just me?",
          "this feels like a bad decision already",
          "i knew this was coming"
        ];
      } else if (type == "emotional") {
        pool = [
          "you miss me or you’re bored?",
          "that’s a dangerous thing to admit",
          "you don’t get to say that so casually"
        ];
      } else {
        pool = [
          "you definitely want something from me",
          "i can tell this is going somewhere",
          "don’t start something you can’t finish"
        ];
      }
    }

    let replies = getUniqueReplies(pool);
    replies.forEach(r => addBubble(r, "outgoing"));

  }, 1000);
}
</script>

</body>
</html>
