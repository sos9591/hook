<!DOCTYPE html>
<html>
<head>
  <title>hook 💖</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ff8fb1);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .phone {
      width: 340px;
      height: 650px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ff4d88;
      font-size: 16px;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 20px;
      margin: 6px 0;
      font-size: 14px;
      line-height: 1.4;
    }

    .incoming {
      background: #f1f1f4;
      color: #333;
      align-self: flex-start;
    }

    .outgoing {
      background: linear-gradient(135deg, #ff4d88, #ff85a2);
      color: white;
      align-self: flex-end;
    }

    .option {
      background: rgba(255,255,255,0.9);
      border: 1px solid #ffd1e1;
      padding: 10px;
      border-radius: 15px;
      margin: 5px 0;
      cursor: pointer;
      font-size: 13px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      outline: none;
      font-size: 14px;
      margin-top: 8px;
    }

    button {
      margin-top: 8px;
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(135deg, #ff4d88, #ff85a2);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .slider {
      margin-top: 10px;
      font-size: 12px;
      color: #ff4d88;
    }

    .typing {
      font-style: italic;
      color: #888;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="phone">
  <div class="header">hook — flirt smarter 💋</div>

  <div class="chat" id="chat"></div>

  <input id="inputMessage" placeholder="what did they say…">

  <div class="slider">
    <input type="range" min="0" max="2" value="1" id="toneSlider" oninput="updateTone()">
    <div id="toneLabel">playful 😏</div>
  </div>

  <button onclick="generate()">generate options</button>
</div>

<script>
let tone = 1;

function updateTone() {
  tone = document.getElementById("toneSlider").value;
  let labels = ["neutral 💌", "playful 😏", "unhinged 🔥"];
  document.getElementById("toneLabel").innerText = labels[tone];
}

function addBubble(text, type) {
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "bubble " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addOption(text) {
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "option";
  div.innerText = text;

  div.onclick = () => {
    addBubble(text, "outgoing");
    div.remove();
  };

  chat.appendChild(div);
}

async function generate() {
  let input = document.getElementById("inputMessage").value;
  if (!input) return;

  addBubble(input, "incoming");

  let chat = document.getElementById("chat");
  let typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "thinking...";
  chat.appendChild(typing);

  // 🔑 REPLACE WITH YOUR API KEY
  const API_KEY = "YOUR_OPENAI_API_KEY";

  const toneStyles = [
    "soft, grounded, slightly flirty",
    "playful, witty, rom-com tension",
    "bold, confident, seductive"
  ];

  const prompt = `You are a texting assistant helping craft attractive replies.

Incoming message: "${input}"
Tone: ${toneStyles[tone]}

Generate 3 different reply options.
- Keep them short (1 sentence)
- Make them feel natural, not robotic
- Channel modern dating + rom com dialogue
- Slight unpredictability

Return ONLY the 3 messages, each on a new line.`;

  try {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [{ role: "user", content: prompt }],
        temperature: 0.9
      })
    });

    const data = await res.json();
    chat.removeChild(typing);

    const replies = data.choices[0].message.content.split("\n");

    replies.forEach(r => {
      if (r.trim()) addOption(r.replace(/^[-\d.\s]+/, ""));
    });

  } catch (err) {
    chat.removeChild(typing);
    addBubble("error generating reply :(", "outgoing");
  }
}
</script>

</body>
</html>
