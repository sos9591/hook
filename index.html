<!DOCTYPE html>
<html>
<head>
  <title>hook 💖</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ff8fb1);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .phone {
      width: 320px;
      height: 620px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ff4d88;
      font-size: 16px;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 14px;
      border-radius: 20px;
      margin: 6px 0;
      font-size: 14px;
      line-height: 1.4;
    }

    .incoming {
      background: #f1f1f4;
      color: #333;
      align-self: flex-start;
    }

    .outgoing {
      background: linear-gradient(135deg, #ff4d88, #ff85a2);
      color: white;
      align-self: flex-end;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 25px;
      border: none;
      outline: none;
      font-size: 14px;
      margin-top: 8px;
    }

    button {
      margin-top: 8px;
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(135deg, #ff4d88, #ff85a2);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .slider {
      margin-top: 10px;
      font-size: 12px;
      color: #ff4d88;
    }

    .typing {
      font-style: italic;
      color: #888;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="phone">
  <div class="header">hook — flirt smarter 💋</div>

  <div class="chat" id="chat"></div>

  <input id="inputMessage" placeholder="what did they say…">

  <div class="slider">
    <input type="range" min="0" max="2" value="1" id="toneSlider" oninput="updateTone()">
    <div id="toneLabel">playful 😏</div>
  </div>

  <button onclick="generate()">send</button>
</div>

<script>
let tone = 1;
let usedReplies = [];

function updateTone() {
  tone = document.getElementById("toneSlider").value;
  let labels = ["neutral 💌", "playful 😏", "unhinged 🔥"];
  document.getElementById("toneLabel").innerText = labels[tone];
}

function analyzeMessage(message) {
  message = message.toLowerCase();

  if (message.includes("wyd") || message.includes("what are you doing")) return "plan";
  if (message.includes("come over")) return "invite";
  if (message.includes("miss you")) return "emotional";
  if (message.includes("u up")) return "late";
  if (message.includes("send a pic") || message.includes("picture")) return "pic";
  if (message.includes("hey") || message.includes("hi")) return "opening";

  return "general";
}

function addBubble(text, type) {
  let chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "bubble " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function pickOne(pool) {
  let fresh = pool.filter(r => !usedReplies.includes(r));
  let options = fresh.length ? fresh : pool;
  let choice = options[Math.floor(Math.random() * options.length)];
  usedReplies.push(choice);
  return choice;
}

function generate() {
  let input = document.getElementById("inputMessage").value;
  if (!input) return;

  addBubble(input, "incoming");

  let chat = document.getElementById("chat");
  let typing = document.createElement("div");
  typing.className = "typing";
  typing.innerText = "typing...";
  chat.appendChild(typing);

  setTimeout(() => {
    chat.removeChild(typing);

    let type = analyzeMessage(input);
    let pool = [];

    // 💌 NEUTRAL (soft, grounded)
    if (tone == 0) {
      if (type == "plan") {
        pool = [
          "not much yet… should i change that?",
          "keeping it lowkey tonight",
          "nothing exciting so far"
        ];
      } 
      else if (type == "emotional") {
        pool = [
          "that’s sweet… i like hearing that",
          "you caught me off guard with that",
          "i didn’t expect that from you"
        ];
      }
      else {
        pool = [
          "hey :)",
          "hi you",
          "well that’s a start"
        ];
      }
    }

    // 😏 PLAYFUL (rom-com tension)
    if (tone == 1) {
      if (type == "plan") {
        pool = [
          "depends… are you about to make it interesting?",
          "nothing yet but that could change",
          "why… what are you suggesting?"
        ];
      }
      else if (type == "invite") {
        pool = [
          "bold of you to assume i’d say yes",
          "hmm… convince me",
          "tempting… keep going"
        ];
      }
      else if (type == "pic") {
        pool = [
          "you first",
          "that’s a bold request",
          "what would you even do with it?"
        ];
      }
      else if (type == "late") {
        pool = [
          "dangerous time to text me",
          "i am now… why?",
          "this feels like trouble"
        ];
      }
      else {
        pool = [
          "just ‘hey’? that’s all?",
          "you can do better than that",
          "hmm try again"
        ];
      }
    }

    // 🔥 UNHINGED (confident + seductive)
    if (tone == 2) {
      if (type == "invite") {
        pool = [
          "say less. send the address",
          "you didn’t think i’d say no, right?",
          "careful… i might actually show up"
        ];
      }
      else if (type == "pic") {
        pool = [
          "you’re bold for asking me that",
          "you think you’ve earned that?",
          "what makes you think i would?"
        ];
      }
      else if (type == "emotional") {
        pool = [
          "you miss me or you’re bored?",
          "that’s a dangerous thing to say",
          "you don’t get to say that so casually"
        ];
      }
      else {
        pool = [
          "you definitely want something",
          "i can tell where this is going",
          "don’t start something you can’t finish"
        ];
      }
    }

    let reply = pickOne(pool);
    addBubble(reply, "outgoing");

  }, 900);
}
</script>

</body>
</html>
